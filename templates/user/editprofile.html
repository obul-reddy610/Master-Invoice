{% extends "base.html" %}
{% load static %}

{% block style %}
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(#616161, black);
    min-height: 100vh;
  }

  .profile-container {
    width: 83%;
    margin: 30px auto;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .form-group {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
  }

  .form-group label {
    width: 15%;
    text-align: right;
    margin-right: 20px;
  }

  .form-group input {
    flex-grow: 1;
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-right: 120px;
  }

  .buttons {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }

  .button {
    background-color: #007bff;
    color: #fff;
    padding: 10px 15px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  .button:hover {
    background-color: #0056b3;
  }

  .footer-button {
    position: fixed;
    bottom: 20px;
    right: 10px;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
  }

  .footer-button i {
    margin-right: 5px;
  }
</style>
{% endblock style %}

{% block content %}
<div class="profile-container">
  <div class="header">
    <h2><b><u>Edit Profile</u></b></h2>
  </div>
  <br />
  {% if message %}
  <div class="alert alert-success" style="padding: 10px; background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 4px; margin-bottom: 20px;">
    {{ message }}
  </div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <div class="form-group">
      <label for="firm_name">Firm Name:</label>
      <input type="text" id="firm_name" name="firm_name" value="{{ user.profile.firm_name }}" maxlength="255" required>
    </div>

    <div class="form-group">
      <label for="full_name">Full Name:</label>
      <input type="text" id="full_name" name="full_name" value="{{ user.profile.full_name }}" maxlength="255" required>
    </div>

    <div class="form-group">
      <label for="phone">Phone:</label>
      <input type="tel" id="phone" name="phone" value="{{ user.profile.phone }}" maxlength="10" pattern="[0-9]{10}" title="Phone number must be exactly 10 digits">
    </div>

    <div class="form-group">
      <label for="address">Address:</label>
      <input type="text" id="address" name="address" value="{{ user.profile.address }}" required>
    </div>

    <div class="buttons">
      <button type="submit" class="button">Save Changes</button>
      <button type="reset" class="button">Reset</button>
    </div>
  </form>
</div>

<div class="footer-button">
  <a class="nav-link" href="#">
    <i class="far fa-arrow-alt-circle-up" style="font-size: 35px; color: aliceblue; padding-right: 20px;"></i>
  </a>
</div>

<!-- Scripts -->
<script src="https://cdn.startbootstrap.com/sb-forms-latest.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
{% endblock content %}
